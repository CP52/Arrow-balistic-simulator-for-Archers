const I18nContext = createContext(null);

function useI18n() {
    return useContext(I18nContext);
}

// Conversioni metrico ↔ imperiale
const conversions = {
    mass_to_imperial: (g) => g * 15.4323584,
    mass_to_metric: (gr) => gr / 15.4323584,
    length_to_imperial: (m) => m * 39.3700787,
    length_to_metric: (in_) => in_ / 39.3700787,
    diameter_to_imperial: (mm) => mm * 0.0393700787,
    diameter_to_metric: (in_) => in_ / 0.0393700787,
    speed_to_imperial: (mps) => mps * 3.2808399,
    speed_to_metric: (fts) => fts / 3.2808399,
    energy_to_imperial: (j) => j * 0.737562149,
    energy_to_metric: (ftlbf) => ftlbf / 0.737562149,
    temp_to_imperial: (c) => c * 9/5 + 32,
    temp_to_metric: (f) => (f - 32) * 5/9,
    pressure_to_imperial: (hpa) => hpa * 0.029529987,
    pressure_to_metric: (inhg) => inhg / 0.029529987,
    altitude_to_imperial: (m) => m * 3.2808399,
    altitude_to_metric: (ft) => ft / 3.2808399,
    distance_to_imperial: (m) => m * 1.09361,
    distance_to_metric: (yd) => yd / 1.09361,
    drop_to_imperial: (cm) => cm * 0.393700787,
    drop_to_metric: (inch) => inch / 0.393700787,
    balance_to_imperial: (m) => m * 39.3700787,
    balance_to_metric: (in_) => in_ / 39.3700787,
};

function I18nProvider({ children }) {
    const [language, setLanguage] = useState('it');
    const [unitSystem, setUnitSystem] = useState('metric');

    const t = useCallback((key, ...args) => {
        let str = translations[language][key] || key;
        if (typeof str === 'function') return str(...args);
        return str;
    }, [language]);

    const convertFromMetric = useCallback((value, quantity) => {
        if (unitSystem === 'metric') return value;
        if (!quantity) return value;
        const conv = conversions[`${quantity}_to_imperial`];
        return conv ? conv(value) : value;
    }, [unitSystem]);

    const convertToMetric = useCallback((value, quantity) => {
        if (unitSystem === 'metric') return value;
        if (!quantity) return value;
        const conv = conversions[`${quantity}_to_metric`];
        return conv ? conv(value) : value;
    }, [unitSystem]);

    const value = { language, setLanguage, unitSystem, setUnitSystem, t, convertFromMetric, convertToMetric };
    return e(I18nContext.Provider, { value }, children);
}

// =============================================================================
// FUNZIONI FISICHE (IDENTICHE ALL'ORIGINALE, RESTANO IN METRICO)
// =============================================================================
function calculateAirDensity(tempC, pressureHpa, humidityPct) {
    const tempK = tempC + 273.15;
    const pSat = 610.78 * Math.exp(17.2694 * tempC / (tempC + 238.3));
    const pVapor = (humidityPct / 100.0) * pSat / 100.0;
    const pDry = pressureHpa - pVapor;
    return (pDry * 100) / (PHYSICAL_CONSTANTS.R_SPECIFIC_AIR * tempK) + (pVapor * 100) / (461.5 * tempK);
}
function reynoldsNumber(v, diameterMm, params) {
    let correctedTemp = params.airTemperature;
    let correctedPressure = params.airPressure;
    if (params.altitude && params.altitude > 0) {
        correctedPressure = params.airPressure * Math.pow(1 - 0.0065 * params.altitude / 288.15, 5.255);
        correctedTemp = params.airTemperature - 0.0065 * params.altitude;
    }
    const rho = calculateAirDensity(correctedTemp, correctedPressure, params.humidity);
    const mu = PHYSICAL_CONSTANTS.AIR_VISCOSITY * (correctedTemp + 273.15) / 291.15;
    return (rho * v * (diameterMm / 1000.0)) / mu;
}
function calculateFOC(length, balancePoint) {
    const centroGeometrico = length / 2;
    return ((balancePoint - centroGeometrico) / length) * 100;
}
function calculateSpineStabilityFactor(spine, arrowLength, params) {
    const drawWeightLb = params.drawForce || 40;
    const arrowLengthInches = arrowLength * 39.37;
    const pointWeight = params.tipWeight || 100;
    const lengthFactor = 1 + (arrowLengthInches - 28) * 0.035;
    const pointFactor = 1 + (pointWeight - 100) * 0.002;
    const idealSpine = (26000 / drawWeightLb) * lengthFactor * pointFactor;
    const spineRatio = spine / idealSpine;
    let oscillationAmplitude = 0;
    if (spineRatio > 1.10) {
        const excess = spineRatio - 1.10;
        oscillationAmplitude = excess * 80;
    } else if (spineRatio < 0.90) {
        const deficit = 0.90 - spineRatio;
        oscillationAmplitude = deficit * 100;
    } else if (spineRatio > 1.0) {
        oscillationAmplitude = (spineRatio - 1.0) * 30;
    } else {
        oscillationAmplitude = (1.0 - spineRatio) * 40;
    }
    let dragIncreaseFactor = 1.0;
    if (oscillationAmplitude > 0) {
        const areaEffect = 1 + oscillationAmplitude * 0.008;
        let turbulenceEffect = 1.0;
        if (oscillationAmplitude > 8) {
            const turbulenceProgress = Math.min(1.0, (oscillationAmplitude - 8) / 17);
            turbulenceEffect = 1 + turbulenceProgress * 0.6;
        }
        dragIncreaseFactor = areaEffect * turbulenceEffect;
    }
    return Math.min(dragIncreaseFactor, 2.5);
}
function enhancedDragCoefficient(v, params, attackAngleDeg = 0) {
    const Re = reynoldsNumber(v, params.diameter, params);
    let baseCd;
    if (Re < 1e3) baseCd = 2.2;
    else if (Re < 2e3) baseCd = 2.2 - 0.8 * (Re - 1e3) / 1e3;
    else if (Re < 1e4) baseCd = 1.4 - 0.15 * (Re - 2e3) / 8e3;
    else if (Re < 3e4) baseCd = 1.25 + 0.95 * (Re - 1e4) / 2e4;
    else if (Re < 1e5) baseCd = 2.2 - 0.8 * (Re - 3e4) / 7e4;
    else if (Re < 3e5) baseCd = 1.4 - 0.2 * (Re - 1e5) / 2e5;
    else baseCd = 1.2;
    const gammaRad = Math.abs(attackAngleDeg) * Math.PI / 180;
    const angleFactor = 1 + 2.5 * Math.pow(gammaRad, 1.5) + 0.8 * Math.pow(gammaRad, 3);
    const tipFactor = TIP_TYPE_CD_FACTOR[params.tipType] || 1.0;
    const fletchingFactor = FLETCHING_TYPE_CD_FACTOR[params.fletchingType] || 1.0;
    const spineFactor = calculateSpineStabilityFactor(params.spine, params.length, params);
    let correctedTemp = params.airTemperature;
    let correctedPressure = params.airPressure;
    if (params.altitude && params.altitude > 0) {
        correctedPressure = params.airPressure * Math.pow(1 - 0.0065 * params.altitude / 288.15, 5.255);
        correctedTemp = params.airTemperature - 0.0065 * params.altitude;
    }
    const currentDensity = calculateAirDensity(correctedTemp, correctedPressure, params.humidity);
    const densityFactor = 1 + 0.003 * (currentDensity / PHYSICAL_CONSTANTS.AIR_DENSITY_STP - 1);
    let focFactor = 1.0;
    if (params.balancePoint && params.length) {
        const foc = calculateFOC(params.length, params.balancePoint);
        if (foc > 15) focFactor = 1 + 0.015 * (foc - 15);
        else if (foc < 7) focFactor = 1 + 0.025 * (7 - foc);
        if (foc < 0) focFactor = 1 + 0.05 * Math.abs(foc);
    }
    return baseCd * angleFactor * tipFactor * fletchingFactor * densityFactor * spineFactor * focFactor;
}
function calculateVelocity(params) {
    if (params.useMeasuredV0 && params.v0 > 0) return params.v0;
    const massKg = params.mass / 1000.0;
    const forceN = params.drawForce * 4.44822;
    const drawM = Math.max(0.001, params.drawLength - params.braceHeight);
    const E_stored = params.efficiency * 0.5 * forceN * drawM;
    let correctedTemp = params.airTemperature;
    let correctedPressure = params.airPressure;
    if (params.altitude && params.altitude > 0) {
        correctedPressure = params.airPressure * Math.pow(1 - 0.0065 * params.altitude / 288.15, 5.255);
        correctedTemp = params.airTemperature - 0.0065 * params.altitude;
    }
    const airDensityRatio = calculateAirDensity(correctedTemp, correctedPressure, params.humidity) / PHYSICAL_CONSTANTS.AIR_DENSITY_STP;
    const initialDragCorrection = 1 - 0.015 * (airDensityRatio - 1);
    const v0 = Math.sqrt(Math.max(1.0, 2 * E_stored / massKg)) * initialDragCorrection;
    return Math.min(v0, 150.0);
}
// RK4 (identico all'originale)
function systemDerivatives(state, params, angleDeg, withDrag, withWind) {
    const [x, y, vx, vy] = state;
    const v = Math.sqrt(vx * vx + vy * vy);
    let ax = 0, ay = -PHYSICAL_CONSTANTS.G;
    if (withDrag && v > 0.1) {
        const flightAngle = Math.atan2(vy, vx) * 180 / Math.PI;
        const angleOfAttack = flightAngle - angleDeg;
        const Cd = enhancedDragCoefficient(v, params, angleOfAttack);
        let correctedTemp = params.airTemperature;
        let correctedPressure = params.airPressure;
        if (params.altitude && params.altitude > 0) {
            correctedPressure = params.airPressure * Math.pow(1 - 0.0065 * params.altitude / 288.15, 5.255);
            correctedTemp = params.airTemperature - 0.0065 * params.altitude;
        }
        const rho = calculateAirDensity(correctedTemp, correctedPressure, params.humidity);
        const A = Math.PI * Math.pow(params.diameter / 2000, 2);
        const massKg = params.mass / 1000;
        const dragForce = 0.5 * rho * v * v * Cd * A;
        ax -= (dragForce / massKg) * (vx / v);
        ay -= (dragForce / massKg) * (vy / v);
    }
    if (withWind && params.windSpeed !== 0) {
        const massKg = params.mass / 1000;
        const A = Math.PI * Math.pow(params.diameter / 2000, 2);
        let correctedTemp = params.airTemperature;
        let correctedPressure = params.airPressure;
        if (params.altitude && params.altitude > 0) {
            correctedPressure = params.airPressure * Math.pow(1 - 0.0065 * params.altitude / 288.15, 5.255);
            correctedTemp = params.airTemperature - 0.0065 * params.altitude;
        }
        const rho = calculateAirDensity(correctedTemp, correctedPressure, params.humidity);
        const CdWind = 1.1;
        const windForce = 0.5 * rho * CdWind * A * params.windSpeed * Math.abs(params.windSpeed);
        ax += windForce / massKg;
    }
    return [vx, vy, ax, ay];
}
function rk4Step(state, dt, params, angleDeg, withDrag, withWind) {
    const k1 = systemDerivatives(state, params, angleDeg, withDrag, withWind);
    const s2 = state.map((s, i) => s + k1[i] * dt / 2);
    const k2 = systemDerivatives(s2, params, angleDeg, withDrag, withWind);
    const s3 = state.map((s, i) => s + k2[i] * dt / 2);
    const k3 = systemDerivatives(s3, params, angleDeg, withDrag, withWind);
    const s4 = state.map((s, i) => s + k3[i] * dt);
    const k4 = systemDerivatives(s4, params, angleDeg, withDrag, withWind);
    return state.map((s, i) => s + (k1[i] + 2*k2[i] + 2*k3[i] + k4[i]) * dt / 6);
}
function integrateTrajectory(angleDeg, params, withDrag = true, withWind = true, maxRange = 150) {
    const v0 = calculateVelocity(params);
    const angleRad = angleDeg * Math.PI / 180;
    let state = [0, params.launchHeightNeutral, v0 * Math.cos(angleRad), v0 * Math.sin(angleRad)];
    const X = [state[0]], Y = [state[1]], Vx = [state[2]], Vy = [state[3]], T = [0];
    const minY = Math.min(-150, (params.targetHeight || 0) - 50);
    let t = 0, dt = 0.001;
    while (state[0] < maxRange && state[1] > minY && t < 30) {
        const fullStep = rk4Step(state, dt, params, angleDeg, withDrag, withWind);
        const halfStep1 = rk4Step(state, dt/2, params, angleDeg, withDrag, withWind);
        const halfStep2 = rk4Step(halfStep1, dt/2, params, angleDeg, withDrag, withWind);
        const error = Math.max(Math.abs(fullStep[0] - halfStep2[0]), Math.abs(fullStep[1] - halfStep2[1]));
        if (error < 1e-6) {
            state = halfStep2;
            t += dt;
            X.push(state[0]); Y.push(state[1]); Vx.push(state[2]); Vy.push(state[3]); T.push(t);
            if (error < 1e-7) dt = Math.min(dt * 1.5, 0.02);
        } else {
            dt = Math.max(dt * 0.5, 1e-8);
        }
    }
    return { X, Y, Vx, Vy, T, v0, flightTime: t, maxHeight: Math.max(...Y) };
}
function interpolateTrajectory(X, Y, targetX) {
    for (let i = 0; i < X.length - 1; i++) {
        if (X[i] <= targetX && X[i+1] >= targetX) {
            const t = (targetX - X[i]) / (X[i+1] - X[i]);
            return Y[i] + t * (Y[i+1] - Y[i]);
        }
    }
    return Y[Y.length - 1];
}
function findOptimalAngle(params) {
    const targetX = params.targetDistance, targetY = params.targetHeight;
    let bestAngle = 0, bestError = Infinity;
    const approxAngle = Math.atan2(targetY, targetX) * 180 / Math.PI;
    const angleMin = Math.max(-60, approxAngle - 30);
    const angleMax = Math.min(70, approxAngle + 40);
    for (let a = angleMin; a <= angleMax; a += 1) {
        const traj = integrateTrajectory(a, params, true, true, targetX * 1.5);
        if (traj.X[traj.X.length - 1] < targetX * 0.9) continue;
        const yAtTarget = interpolateTrajectory(traj.X, traj.Y, targetX);
        const error = Math.abs(yAtTarget - targetY);
        if (error < bestError) { bestError = error; bestAngle = a; }
    }
    for (let delta = 0.5; delta >= 0.01; delta /= 2) {
        for (const dir of [-1, 1]) {
            const testAngle = bestAngle + dir * delta;
            const traj = integrateTrajectory(testAngle, params, true, true, targetX * 1.5);
            if (traj.X[traj.X.length - 1] < targetX * 0.9) continue;
            const yAtTarget = interpolateTrajectory(traj.X, traj.Y, targetX);
            const error = Math.abs(yAtTarget - targetY);
            if (error < bestError) { bestError = error; bestAngle = testAngle; }
        }
    }
    return [bestAngle, bestError];
}
function calculatePosturalLaunchHeight(angleRad, params) {
    const neutralHeight = params.launchHeightNeutral;
    const pelvisHeight = params.pelvisHeight || 1.05;
    const anchorLength = params.anchorLength || 0.72;
    const pivotHeight = neutralHeight - pelvisHeight;
    const armDisplacementY = anchorLength * Math.sin(angleRad);
    const finalHeight = pivotHeight + pelvisHeight + armDisplacementY;
    return Math.max(0.1, finalHeight);
}
function calculateMaxRange(params) {
    const targetY = params.targetHeight || 0;
    let bestAngle = 35, bestRange = 0;
    for (let angle = 20; angle <= 50; angle += 1) {
        const traj = integrateTrajectory(angle, params, true, true, 500);
        let maxHeightIdx = 0;
        for (let i = 1; i < traj.Y.length; i++) {
            if (traj.Y[i] > traj.Y[maxHeightIdx]) maxHeightIdx = i;
        }
        for (let i = maxHeightIdx; i < traj.Y.length - 1; i++) {
            if (traj.Y[i] >= targetY && traj.Y[i + 1] <= targetY) {
                const t = (targetY - traj.Y[i]) / (traj.Y[i + 1] - traj.Y[i]);
                const rangeAtTarget = traj.X[i] + t * (traj.X[i + 1] - traj.X[i]);
                if (rangeAtTarget > bestRange) { bestRange = rangeAtTarget; bestAngle = angle; }
                break;
            }
        }
    }
    for (let delta = 0.5; delta >= 0.1; delta /= 2) {
        for (const dir of [-1, 1]) {
            const testAngle = bestAngle + dir * delta;
            const traj = integrateTrajectory(testAngle, params, true, true, 500);
            let maxHeightIdx = 0;
            for (let i = 1; i < traj.Y.length; i++) {
                if (traj.Y[i] > traj.Y[maxHeightIdx]) maxHeightIdx = i;
            }
            for (let i = maxHeightIdx; i < traj.Y.length - 1; i++) {
                if (traj.Y[i] >= targetY && traj.Y[i + 1] <= targetY) {
                    const t = (targetY - traj.Y[i]) / (traj.Y[i + 1] - traj.Y[i]);
                    const rangeAtTarget = traj.X[i] + t * (traj.X[i + 1] - traj.X[i]);
                    if (rangeAtTarget > bestRange) { bestRange = rangeAtTarget; bestAngle = testAngle; }
                    break;
                }
            }
        }
    }
    return { maxRange: Math.round(bestRange * 10) / 10, optimalAngle: Math.round(bestAngle * 10) / 10 };
}
function calculateSightProjection(distance, dropM, params) {
    const horizontalDistance = distance;
    const verticalOffset = dropM;
    const projectionM = horizontalDistance * (params.eyeToNock + verticalOffset) / (params.nockToRiser + horizontalDistance);
    const projectionCm = projectionM * 100.0 - verticalOffset * 100.0;
    return projectionCm;
}
function generateSightMarks(distances, trajectory, params, optimalAngle, nockingAngleOffset = 0) {
    const massKg = params.mass / 1000;
    return distances.map(d => {
        const yAtD = interpolateTrajectory(trajectory.X, trajectory.Y, d);
        const ySight = params.launchHeightNeutral + Math.tan(optimalAngle * Math.PI / 180) * d;
        const dropM = ySight - yAtD;
        const proj = calculateSightProjection(d, dropM, params);
        const vxAtD = interpolateTrajectory(trajectory.X, trajectory.Vx, d);
        const vyAtD = interpolateTrajectory(trajectory.X, trajectory.Vy, d);
        const vAtD = Math.sqrt(vxAtD * vxAtD + vyAtD * vyAtD);
        return {
            distance: d,
            dropCm: Math.round(dropM * 100 * 10) / 10,
            projectionCm: Math.round(proj * 100) / 100,
            energy: Math.round(0.5 * massKg * vAtD * vAtD * 10) / 10,
            velocity: Math.round(vAtD * 10) / 10
        };
    });
}

// Campo dedicato per l'offset di incocco: sempre in mm, con pulsanti +/-
// NON usa il sistema di conversione unità: internamente è già in mm e rimane tale.
function NockingOffsetField({ value, onChange }) {
    const { t } = useI18n();
    // value è in mm (es. 5 = 5mm sopra la perpendicolare)
    const step = 1; // mm
    const min = -10;
    const max = 20;
    const [display, setDisplay] = useState(String(value));
    useEffect(() => { setDisplay(String(value)); }, [value]);
    const commit = (v) => {
        let n = parseFloat(v);
        if (isNaN(n)) { setDisplay(String(value)); return; }
        n = Math.max(min, Math.min(max, Math.round(n)));
        onChange(n);
        setDisplay(String(n));
    };
    return e('div', { className: 'form-group' },
        e('label', { className: 'label' }, `${t('nockingOffsetLabel')} (mm)`),
        e('div', { style: { display: 'flex', alignItems: 'center', gap: '4px' } },
            e('button', {
                onClick: () => { const nv = Math.max(min, value - step); onChange(nv); setDisplay(String(nv)); },
                style: { padding: '2px 8px', borderRadius: '4px', border: '1px solid #475569', background: '#334155', color: '#fff', cursor: 'pointer', fontSize: '1rem', lineHeight: '1.4', flexShrink: 0 }
            }, '−'),
            e('input', {
                type: 'text', inputMode: 'decimal',
                value: display,
                onChange: ev => setDisplay(ev.target.value),
                onBlur: ev => commit(ev.target.value),
                className: 'input-field',
                style: { textAlign: 'center', flex: 1 }
            }),
            e('button', {
                onClick: () => { const nv = Math.min(max, value + step); onChange(nv); setDisplay(String(nv)); },
                style: { padding: '2px 8px', borderRadius: '4px', border: '1px solid #475569', background: '#334155', color: '#fff', cursor: 'pointer', fontSize: '1rem', lineHeight: '1.4', flexShrink: 0 }
            }, '+')
        )
    );
}

function InputFieldWithUnits({ labelKey, valueMetric, onChange, min, max, step, disabled, quantity }) {
    const { t, unitSystem, convertFromMetric, convertToMetric } = useI18n();

    // draft: stringa grezza visibile nel campo. Aggiornata solo localmente durante
    // la digitazione; il valore metrico globale viene committato solo su blur/Enter.
    const [draft, setDraft] = useState(() => convertFromMetric(valueMetric, quantity).toFixed(2));
    const inputRef = React.useRef(null);
    const committedMetricRef = React.useRef(valueMetric);

    // Sincronizza il draft quando il valore esterno cambia (cambio unità, reset, ecc.)
    // ma solo se il campo NON è attivo -- per non interrompere la digitazione in corso.
    useEffect(() => {
        if (inputRef.current && inputRef.current === document.activeElement) return;
        committedMetricRef.current = valueMetric;
        setDraft(convertFromMetric(valueMetric, quantity).toFixed(2));
    }, [valueMetric, unitSystem, quantity]);

    // Durante la digitazione aggiorna solo il draft locale, MAI lo stato globale.
    const handleChange = (ev) => {
        setDraft(ev.target.value);
    };

    // Commit: valida, converte in metrico, clamp, chiama onChange una sola volta.
    const commit = (raw) => {
        const trimmed = (raw || '').trim();
        if (trimmed === '' || trimmed === '-' || trimmed === '.' || trimmed === '-.') {
            // Valore incompleto: ripristina l'ultimo valore valido
            setDraft(convertFromMetric(committedMetricRef.current, quantity).toFixed(2));
            return;
        }
        const num = parseFloat(trimmed);
        if (isNaN(num)) {
            setDraft(convertFromMetric(committedMetricRef.current, quantity).toFixed(2));
            return;
        }
        let metricVal = convertToMetric(num, quantity);
        if (!isNaN(min) && metricVal < min) metricVal = min;
        if (!isNaN(max) && metricVal > max) metricVal = max;
        committedMetricRef.current = metricVal;
        setDraft(convertFromMetric(metricVal, quantity).toFixed(2));
        if (metricVal !== valueMetric) onChange(metricVal);
    };

    const handleBlur  = (ev) => commit(ev.target.value);
    const handleKeyDown = (ev) => { if (ev.key === 'Enter') { commit(ev.target.value); ev.target.blur(); } };

    let unitLabel = '';
    if (quantity === 'mass') unitLabel = unitSystem === 'metric' ? t('unit_mass_metric') : t('unit_mass_imperial');
    else if (quantity === 'length') unitLabel = unitSystem === 'metric' ? t('unit_length_metric') : t('unit_length_imperial');
    else if (quantity === 'diameter') unitLabel = unitSystem === 'metric' ? t('unit_diameter_metric') : t('unit_diameter_imperial');
    else if (quantity === 'drawForce') unitLabel = t('unit_drawForce');
    else if (quantity === 'speed') unitLabel = unitSystem === 'metric' ? t('unit_speed_metric') : t('unit_speed_imperial');
    else if (quantity === 'energy') unitLabel = unitSystem === 'metric' ? t('unit_energy_metric') : t('unit_energy_imperial');
    else if (quantity === 'temperature') unitLabel = unitSystem === 'metric' ? t('unit_temp_metric') : t('unit_temp_imperial');
    else if (quantity === 'pressure') unitLabel = unitSystem === 'metric' ? t('unit_pressure_metric') : t('unit_pressure_imperial');
    else if (quantity === 'altitude') unitLabel = unitSystem === 'metric' ? t('unit_altitude_metric') : t('unit_altitude_imperial');
    else if (quantity === 'distance') unitLabel = unitSystem === 'metric' ? t('unit_distance_metric') : t('unit_distance_imperial');
    else if (quantity === 'balance') unitLabel = unitSystem === 'metric' ? t('unit_balance_metric') : t('unit_balance_imperial');
    else unitLabel = '';
    return e('div', { className: 'form-group' },
        e('label', { className: 'label' }, `${t(labelKey)}${unitLabel ? ` (${unitLabel})` : ''}`),
        e('input', {
            ref: inputRef,
            type: 'text',
            inputMode: 'decimal',
            value: draft,
            onChange: handleChange,
            onBlur: handleBlur,
            onKeyDown: handleKeyDown,
            disabled,
            className: 'input-field',
            style: { textAlign: 'right' }
        })
    );
}

// SVGChart modificato per accettare testo diretto degli assi con unità
function SVGChart({ data, xKey, yKeys, colors, xLabelText, yLabelText, xDomain, yDomain, width = 600, height = 280, showDots, refPoints, darkMode, yKeyLabels }) {
    const [tooltip, setTooltip] = useState(null);
    const svgRef = React.useRef(null);
    const margin = { top: 20, right: 20, bottom: 40, left: 55 };
    const w = width - margin.left - margin.right;
    const h = height - margin.top - margin.bottom;
    if (!data || data.length === 0) return null;
    const xMin = xDomain ? xDomain[0] : Math.min(...data.map(d => d[xKey]));
    const xMax = xDomain ? xDomain[1] : Math.max(...data.map(d => d[xKey]));
    const allY = data.flatMap(d => yKeys.map(k => d[k]).filter(v => v !== undefined && !isNaN(v)));
    let yMin, yMax;
    if (yDomain) { yMin = yDomain[0]; yMax = yDomain[1]; }
    else {
        const dataYMin = Math.min(...allY);
        const dataYMax = Math.max(...allY);
        const range = dataYMax - dataYMin;
        const margin_y = range * 0.1 || 1;
        yMin = dataYMin - margin_y;
        yMax = dataYMax + margin_y;
    }
    if (yMax === yMin) { yMax = yMin + 1; }
    if (xMax === xMin) return null;
    const scaleX = x => margin.left + (x - xMin) / (xMax - xMin) * w;
    const scaleY = y => margin.top + h - (y - yMin) / (yMax - yMin) * h;
    const unscaleX = px => xMin + (px - margin.left) / w * (xMax - xMin);
    const gridColor = darkMode ? '#374151' : '#e5e7eb';
    const textColor = darkMode ? '#9ca3af' : '#4b5563';
    const axisColor = darkMode ? '#4b5563' : '#9ca3af';
    function generateTicks(min, max, targetCount = 6) {
        const range = max - min;
        const roughStep = range / targetCount;
        const magnitude = Math.pow(10, Math.floor(Math.log10(roughStep)));
        let step;
        if (roughStep / magnitude < 1.5) step = magnitude;
        else if (roughStep / magnitude < 3) step = 2 * magnitude;
        else if (roughStep / magnitude < 7) step = 5 * magnitude;
        else step = 10 * magnitude;
        const ticks = [];
        let tick = Math.ceil(min / step) * step;
        while (tick <= max) {
            ticks.push(Math.round(tick * 1000) / 1000);
            tick += step;
        }
        return ticks;
    }
    const xTicks = generateTicks(xMin, xMax, 8);
    const yTicks = generateTicks(yMin, yMax, 6);
    const handleMouseMove = (evt) => {
        if (!svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const mouseX = evt.clientX - rect.left;
        const scaleFactor = rect.width / width;
        const dataX = unscaleX(mouseX / scaleFactor);
        let closestPoint = null;
        let minDist = Infinity;
        data.forEach(d => {
            const dist = Math.abs(d[xKey] - dataX);
            if (dist < minDist) { minDist = dist; closestPoint = d; }
        });
        const svgMouseX = mouseX / scaleFactor;
        if (closestPoint && svgMouseX >= margin.left && svgMouseX <= margin.left + w) {
            const lineXinSvg = scaleX(closestPoint[xKey]);
            const lineXinCss = lineXinSvg * scaleFactor;
            setTooltip({ x: lineXinCss, xSvg: lineXinSvg, data: closestPoint, scaleFactor });
        } else setTooltip(null);
    };
    const handleMouseLeave = () => setTooltip(null);
    const defaultLabels = yKeys.reduce((acc, k, i) => { acc[k] = k; return acc; }, {});
    const labels = yKeyLabels || defaultLabels;
    return e('div', { style: { position: 'relative', overflow: 'hidden' } },
        e('svg', { ref: svgRef, width: '100%', height: height, viewBox: `0 0 ${width} ${height}`, style: { display: 'block', cursor: 'crosshair' }, onMouseMove: handleMouseMove, onMouseLeave: handleMouseLeave },
            ...xTicks.map(x => e('line', { key: 'gx'+x, x1: scaleX(x), x2: scaleX(x), y1: margin.top, y2: margin.top + h, stroke: gridColor, strokeDasharray: '3,3' })),
            ...yTicks.map(y => e('line', { key: 'gy'+y, x1: margin.left, x2: margin.left + w, y1: scaleY(y), y2: scaleY(y), stroke: gridColor, strokeDasharray: '3,3' })),
            e('line', { x1: margin.left, x2: margin.left + w, y1: margin.top + h, y2: margin.top + h, stroke: axisColor, strokeWidth: 1 }),
            e('line', { x1: margin.left, x2: margin.left, y1: margin.top, y2: margin.top + h, stroke: axisColor, strokeWidth: 1 }),
            (yMin < 0 && yMax > 0) ? e('line', { x1: margin.left, x2: margin.left + w, y1: scaleY(0), y2: scaleY(0), stroke: axisColor, strokeWidth: 1, strokeDasharray: '5,5' }) : null,
            ...xTicks.map(x => e('text', { key: 'tx'+x, x: scaleX(x), y: margin.top + h + 18, fill: textColor, fontSize: 10, textAnchor: 'middle' }, Math.round(x * 10) / 10)),
            ...yTicks.map(y => e('text', { key: 'ty'+y, x: margin.left - 8, y: scaleY(y) + 4, fill: textColor, fontSize: 10, textAnchor: 'end' }, Math.abs(y) >= 100 ? Math.round(y) : Math.round(y * 10) / 10)),
            e('text', { x: margin.left + w/2, y: height - 5, fill: textColor, fontSize: 11, textAnchor: 'middle' }, xLabelText),
            e('text', { x: 14, y: margin.top + h/2, fill: textColor, fontSize: 11, textAnchor: 'middle', transform: `rotate(-90, 14, ${margin.top + h/2})` }, yLabelText),
            ...yKeys.map((yKey, idx) => {
                const validData = data.filter(d => d[yKey] !== undefined && !isNaN(d[yKey]));
                if (validData.length < 2) return null;
                const points = validData.map(d => `${scaleX(d[xKey])},${scaleY(d[yKey])}`).join(' ');
                const dashArray = idx === 1 ? '5,5' : idx === 2 ? '3,3' : 'none';
                return e('polyline', { key: yKey, points, fill: 'none', stroke: colors[idx], strokeWidth: idx === 0 ? 2.5 : 1.5, strokeDasharray: dashArray });
            }),
            tooltip ? e('line', { x1: tooltip.xSvg, x2: tooltip.xSvg, y1: margin.top, y2: margin.top + h, stroke: darkMode ? '#818cf8' : '#4f46e5', strokeWidth: 1, strokeDasharray: '4,4' }) : null,
            tooltip ? yKeys.map((yKey, idx) => {
                const val = tooltip.data[yKey];
                if (val === undefined || isNaN(val)) return null;
                return e('circle', { key: 'cursor-'+yKey, cx: tooltip.xSvg, cy: scaleY(val), r: 5, fill: colors[idx], stroke: '#fff', strokeWidth: 2 });
            }) : null,
            showDots ? data.map((d, i) => yKeys.map((yKey, idx) => d[yKey] !== undefined && !isNaN(d[yKey]) ? e('circle', { key: `dot-${i}-${idx}`, cx: scaleX(d[xKey]), cy: scaleY(d[yKey]), r: 4, fill: colors[idx], stroke: darkMode ? '#1e293b' : '#fff', strokeWidth: 1 }) : null)) : null,
            refPoints ? refPoints.map((p, i) => e('circle', { key: 'ref'+i, cx: scaleX(p.x), cy: scaleY(p.y), r: p.r || 6, fill: p.color, stroke: '#fff', strokeWidth: 2 })) : null
        ),
        tooltip && e('div', { style: { position: 'absolute', left: (tooltip.x) + 'px', top: margin.top * tooltip.scaleFactor + 5 + 'px', width: '130px', background: darkMode ? 'rgba(30, 41, 59, 0.95)' : 'rgba(255, 255, 255, 0.95)', border: `1px solid ${darkMode ? '#475569' : '#d1d5db'}`, borderRadius: '6px', padding: '8px 12px', fontSize: '11px', boxShadow: '0 4px 12px rgba(0,0,0,0.15)', pointerEvents: 'none', zIndex: 10 } },
            e('div', { style: { fontWeight: 'bold', marginBottom: '4px', color: darkMode ? '#818cf8' : '#4f46e5' } }, `${xLabelText.split(' ')[0]}: ${Math.round(tooltip.data[xKey] * 100) / 100}`),
            ...yKeys.map((yKey, idx) => {
                const val = tooltip.data[yKey];
                if (val === undefined || isNaN(val)) return null;
                return e('div', { key: yKey, style: { display: 'flex', alignItems: 'center', gap: '6px', marginTop: '2px' } },
                    e('span', { style: { width: '10px', height: '3px', backgroundColor: colors[idx], borderRadius: '1px' } }),
                    e('span', { style: { color: darkMode ? '#cbd5e1' : '#374151' } }, `${labels[yKey]}: `),
                    e('span', { style: { fontWeight: 'bold', color: colors[idx] } }, Math.round(val * 100) / 100)
                );
            })
        )
    );
}

function SightScaleViz({ sightMarks, eyeToNock, nockToRiser, darkMode }) {
    const { t, unitSystem, convertFromMetric } = useI18n();
    if (!sightMarks || !sightMarks.length) return null;
    let projections = sightMarks.map(m => m.projectionCm);
    if (unitSystem === 'imperial') {
        projections = projections.map(cm => conversions.drop_to_imperial(cm));
    }
    const minP = Math.min(...projections, 0);
    const maxP = Math.max(...projections, 0);
    const padding = 3;
    const rangeMin = minP - padding;
    const rangeMax = maxP + padding;
    const range = rangeMax - rangeMin || 1;
    const toPercent = val => ((val - rangeMin) / range) * 100;
    const laserDist = 30;
    const laserProjM = laserDist * eyeToNock / (nockToRiser + laserDist);
    let laserProjCm = laserProjM * 100;
    if (unitSystem === 'imperial') laserProjCm = conversions.drop_to_imperial(laserProjCm);
    return e('div', { className: 'sight-scale' },
        e('div', { className: 'sight-scale-inner' },
            e('div', { className: 'sight-bar' }),
            e('div', { className: 'zero-line', style: { bottom: toPercent(0) + '%' } }, e('span', { className: 'zero-label' }, '0 cm')),
            sightMarks.map((m, i) => {
                let proj = m.projectionCm;
                if (unitSystem === 'imperial') proj = conversions.drop_to_imperial(proj);
                const dist = unitSystem === 'metric' ? m.distance : conversions.distance_to_imperial(m.distance);
                return e('div', { key: m.distance, className: 'sight-mark', style: { bottom: toPercent(proj) + '%', width: 20, backgroundColor: `hsl(${200 + i * 15}, 70%, ${darkMode ? 55 : 45}%)` } },
                    e('span', { className: 'sight-mark-label ' + (i % 2 === 0 ? 'left' : 'right'), style: { color: darkMode ? '#cbd5e1' : '#374151' } }, Math.round(dist) + (unitSystem === 'metric' ? 'm' : 'yd'))
                );
            }),
            e('div', { className: 'laser-dot', style: { bottom: toPercent(laserProjCm) + '%' } },
                e('span', { className: 'laser-label' }, `Laser ${unitSystem === 'metric' ? '30m' : '33yd'}`)
            )
        )
    );
}

    const calculatedV0 = useMemo(() => {
        const params = { mass, length, spine, diameter, tipWeight, balancePoint, tipType, fletchingType, drawForce, drawLength, braceHeight, efficiency, bowType, launchHeightNeutral, targetDistance, targetHeight, useMeasuredV0, v0: v0Measured, windSpeed, airTemperature, airPressure, humidity, altitude, eyeToNock, nockToRiser };
        return calculateVelocity(params);
    }, [mass, drawForce, drawLength, braceHeight, efficiency, useMeasuredV0, v0Measured, airTemperature, airPressure, humidity, altitude]);
    const calculatedFOC = useMemo(() => calculateFOC(length, balancePoint), [length, balancePoint]);

    // Preparazione dati convertiti per i grafici in base al sistema di unità
    const imperialChartData = useMemo(() => {
        if (!results?.chartData) return null;
        if (unitSystem === 'metric') return results.chartData;
        return results.chartData.map(d => ({
            x: conversions.distance_to_imperial(d.x),
            yReal: conversions.length_to_imperial(d.yReal),
            yIdeal: conversions.length_to_imperial(d.yIdeal),
            ySight: conversions.length_to_imperial(d.ySight),
            vTotal: conversions.speed_to_imperial(d.vTotal),
            vx: conversions.speed_to_imperial(d.vx),
            vy: conversions.speed_to_imperial(d.vy),
            energyPct: d.energyPct
        }));
    }, [results, unitSystem]);

    const imperialDropData = useMemo(() => {
        if (!results?.dropData) return null;
        if (unitSystem === 'metric') return results.dropData;
        // dropData va convertita: x in distanza imperiale, drop in pollici
        return results.dropData.map(d => ({

        }));
    }, [results, unitSystem]);

    const runSimulation = useCallback(() => {
        setIsSimulating(true);
        setTimeout(() => {
            try {
                const baseParams = { 
                    mass, length, spine, diameter, tipWeight, balancePoint, tipType, fletchingType, 
                    drawForce, drawLength, braceHeight, efficiency, bowType, 
                    launchHeightNeutral, targetDistance, targetHeight, 
                    useMeasuredV0, v0: v0Measured, windSpeed, airTemperature, 
                    airPressure, humidity, altitude, eyeToNock, nockToRiser, nockingOffset,
                    anchorLength, pelvisHeight
                };
                const nockingOffsetM = nockingOffset / 1000;
                const restToCockDistance = length * 0.9;
                const nockingAngleOffset = Math.atan2(nockingOffsetM, restToCockDistance) * 180 / Math.PI;
                let finalLaunchHeight = launchHeightNeutral;
                let effectiveLaunchAngle;
                if (usePosturalCorrection) {
                    let currentHeight = launchHeightNeutral;
                    for (let iter = 0; iter < 8; iter++) {
                        const iterParams = { ...baseParams, launchHeightNeutral: currentHeight };
                        const [angleEffective] = findOptimalAngle(iterParams);
                        const angleRad = angleEffective * Math.PI / 180;
                        const newHeight = calculatePosturalLaunchHeight(angleRad, baseParams);
                        if (Math.abs(newHeight - currentHeight) < 0.001) {
                            effectiveLaunchAngle = angleEffective;
                            finalLaunchHeight = newHeight;
                            break;
                        }
                        currentHeight = newHeight;
                        effectiveLaunchAngle = angleEffective;
                        finalLaunchHeight = newHeight;
                    }
                } else {
                    const [angleEffective] = findOptimalAngle(baseParams);
                    effectiveLaunchAngle = angleEffective;
                    finalLaunchHeight = launchHeightNeutral;
                }
                const aimAngle = effectiveLaunchAngle - nockingAngleOffset;
                const params = { ...baseParams, launchHeightNeutral: finalLaunchHeight };
                const maxRange = Math.max(distMax, targetDistance) * 1.3;
                const trajectory = integrateTrajectory(effectiveLaunchAngle, params, true, true, maxRange);
                const idealTrajectory = integrateTrajectory(effectiveLaunchAngle, params, false, false, maxRange);
                const maxRangeInfo = calculateMaxRange(params);
                const distances = [];
                for (let d = distMin; d <= distMax; d += distStep) distances.push(d);
                const sightMarks = generateSightMarks(distances, trajectory, params, aimAngle, nockingAngleOffset);
                const impactHeight = interpolateTrajectory(trajectory.X, trajectory.Y, targetDistance);
                const chartData = [];
                const step = Math.max(1, Math.floor(trajectory.X.length / 100));
                for (let i = 0; i < trajectory.X.length; i += step) {
                    const x = trajectory.X[i];
                    if (x > targetDistance * 1.05) continue;
                    const yReal = trajectory.Y[i];
                    const ySight = finalLaunchHeight + Math.tan(aimAngle * Math.PI / 180) * x;
                    const yIdeal = interpolateTrajectory(idealTrajectory.X, idealTrajectory.Y, x);
                    const vx = trajectory.Vx[i], vy = trajectory.Vy[i];
                    const vTotal = Math.sqrt(vx * vx + vy * vy);
                    const energyPct = (vTotal * vTotal) / (trajectory.v0 * trajectory.v0) * 100;
                    chartData.push({ x: Math.round(x * 100) / 100, yReal: Math.round(yReal * 100) / 100, yIdeal: Math.round(yIdeal * 100) / 100, ySight: Math.round(ySight * 100) / 100, vTotal: Math.round(vTotal * 10) / 10, vx: Math.round(vx * 10) / 10, vy: Math.round(vy * 10) / 10, energyPct: Math.round(energyPct * 10) / 10 });
                }
                const dropData = sightMarks.map(m => ({ x: m.distance, drop: m.dropCm }));
                const targetDrop = sightMarks.find(m => m.distance === targetDistance)?.dropCm || Math.round((finalLaunchHeight + Math.tan(aimAngle * Math.PI / 180) * targetDistance - impactHeight) * 1000) / 10;
                const posturalDeltaHeight = usePosturalCorrection ? (finalLaunchHeight - launchHeightNeutral) : 0;
                setResults({ trajectory, idealTrajectory, aimAngle, effectiveLaunchAngle, nockingAngleOffset, sightMarks, chartData, dropData, impactHeight, targetDrop, maxRangeInfo, finalLaunchHeight, posturalDeltaHeight });
            } catch (err) { console.error(err); alert("Errore: " + err.message); }
            finally { setIsSimulating(false); }
        }, 50);
    }, [mass, length, spine, diameter, tipWeight, balancePoint, tipType, fletchingType, drawForce, drawLength, braceHeight, efficiency, bowType, targetDistance, targetHeight, useMeasuredV0, v0Measured, windSpeed, airTemperature, airPressure, humidity, altitude, eyeToNock, nockToRiser, nockingOffset, launchHeightNeutral, anchorLength, pelvisHeight, usePosturalCorrection, distMin, distMax, distStep]);

        const today = new Date().toLocaleDateString(language === 'it' ? 'it-IT' : 'en-US');
        doc.setFontSize(8); doc.text(`Generated on ${today}`, pageWidth / 2, 34, { align: 'center' });
        let y = 45;
        doc.setFillColor(230,240,250); doc.rect(margin, y-5, pageWidth-2*margin, 8, 'F');
        doc.setFontSize(9); doc.setFont('helvetica', 'bold');

        results.sightMarks.forEach((m, i) => {

            let drop = unitSystem === 'metric' ? m.dropCm : conversions.drop_to_imperial(m.dropCm);
            let proj = unitSystem === 'metric' ? m.projectionCm : conversions.drop_to_imperial(m.projectionCm);
            let energy = unitSystem === 'metric' ? m.energy : conversions.energy_to_imperial(m.energy);
            let vel = unitSystem === 'metric' ? m.velocity : conversions.speed_to_imperial(m.velocity);

            else if (i % 2 === 0) { doc.setFillColor(248,248,248); doc.rect(margin, y-4, pageWidth-2*margin, 6, 'F'); }
            doc.text(dist.toFixed(1), margin + colWidth*0.5, y, { align: 'center' });
            doc.text(drop.toFixed(1), margin + colWidth*1.5, y, { align: 'center' });
            doc.text(proj.toFixed(1), margin + colWidth*2.5, y, { align: 'center' });
            doc.text(energy.toFixed(1), margin + colWidth*3.5, y, { align: 'center' });
            doc.text(vel.toFixed(1), margin + colWidth*4.5, y, { align: 'center' });
            if (m.distance === targetDistance) doc.setFont('helvetica', 'normal');
            y += 6;
        });
        doc.line(margin, y-2, pageWidth-margin, y-2);
        y += 15;
        doc.setFontSize(11); doc.setFont('helvetica', 'bold'); doc.text('Sight Visual Scale', pageWidth / 2, y, { align: 'center' });
        y += 10;
        const scaleX = pageWidth / 2;
        let projections = results.sightMarks.map(m => m.projectionCm);
        if (unitSystem === 'imperial') projections = projections.map(cm => conversions.drop_to_imperial(cm));
        const minP = Math.min(...projections, 0), maxP = Math.max(...projections, 0);
        const rangeMin = minP - 1, rangeMax = maxP + 1, rangeCm = rangeMax - rangeMin || 1;
        const MM_PER_CM = 10;
        const scaleHeight = rangeCm * MM_PER_CM;
        const scaleTop = y;
        const toY = (cm) => scaleTop + (rangeMax - cm) * MM_PER_CM;
        doc.setDrawColor(100,100,100); doc.setLineWidth(1); doc.line(scaleX, scaleTop, scaleX, scaleTop + scaleHeight);
        const zeroY = toY(0); doc.setDrawColor(200,0,0); doc.setLineWidth(0.5); doc.line(scaleX-15, zeroY, scaleX+15, zeroY);
        doc.setFontSize(7); doc.setTextColor(200,0,0); doc.text('0 cm', scaleX+18, zeroY+1);
        doc.setTextColor(0,0,0);
        results.sightMarks.forEach((m, i) => {
            let proj = unitSystem === 'metric' ? m.projectionCm : conversions.drop_to_imperial(m.projectionCm);
            let markY = toY(proj);
            doc.setDrawColor(50,100,150); doc.setLineWidth(0.8); doc.line(scaleX-8, markY, scaleX+8, markY);
            doc.setFontSize(7);
            let dist = unitSystem === 'metric' ? m.distance : conversions.distance_to_imperial(m.distance);
            if (i % 2 === 0) doc.text(`${dist.toFixed(0)}${unitSystem === 'metric' ? 'm' : 'yd'}`, scaleX-12, markY+1, { align: 'right' });
            else doc.text(`${dist.toFixed(0)}${unitSystem === 'metric' ? 'm' : 'yd'}`, scaleX+12, markY+1);
        });
        const laserDist = 30;
        const laserProjM = laserDist * eyeToNock / (nockToRiser + laserDist);
        let laserProjCm = laserProjM * 100;

        doc.setFillColor(34,197,94); doc.setDrawColor(34,197,94); doc.circle(scaleX, laserY, 2, 'F');

        doc.setTextColor(0,0,0);

        const rightRulerStartX = scaleX + 25;
        doc.line(rightRulerStartX, zeroYpos, rightRulerStartX + rulerLength, zeroYpos);
        for (let i = 0; i <= 5; i++) {

            doc.line(tickX, zeroYpos - th, tickX, zeroYpos + th);
            doc.text(String(i), tickX, zeroYpos + 6, { align: 'center' });

        doc.text('cm', rightRulerStartX + rulerLength + 4, zeroYpos + 1);

        doc.text('Scala 1:1 - Stampare al 100% / Print at 100%', pageWidth / 2, scaleTop + scaleHeight + 18, { align: 'center' });
        doc.setTextColor(0,0,0);

        doc.save(`sight_scale_${targetDistance}${unitSystem === 'metric' ? 'm' : 'yd'}.pdf`);
    }, [results, targetDistance, eyeToNock, nockToRiser, unitSystem, language, t]);

                e('button', { onClick: () => setLanguage('en'), style: { fontWeight: language === 'en' ? 'bold' : 'normal', opacity: language === 'en' ? 1 : 0.7 } }, '🇬🇧'),
                e('button', { onClick: () => setLanguage('es'), style: { fontWeight: language === 'es' ? 'bold' : 'normal', opacity: language === 'es' ? 1 : 0.7 } }, '🇪🇸'),
                e('button', { onClick: () => setLanguage('fr'), style: { fontWeight: language === 'fr' ? 'bold' : 'normal', opacity: language === 'fr' ? 1 : 0.7 } }, '🇫🇷'),
                e('button', { onClick: () => setLanguage('de'), style: { fontWeight: language === 'de' ? 'bold' : 'normal', opacity: language === 'de' ? 1 : 0.7 } }, '🇩🇪')
            ),

        ),
        e('div', { className: 'main-layout' },
            e('div', { className: 'params-grid' },
                e(CollapsiblePanel, { titleKey: 'arrowPanel' },
                    e(InputFieldWithUnits, { labelKey: 'massLabel', valueMetric: mass, onChange: setMass, min: 8, max: 80, step: 0.5, quantity: 'mass' }),
                    e(InputFieldWithUnits, { labelKey: 'lengthLabel', valueMetric: length, onChange: setLength, min: 0.5, max: 1.2, step: 0.01, quantity: 'length' }),
                    e(InputFieldWithUnits, { labelKey: 'diameterLabel', valueMetric: diameter, onChange: setDiameter, min: 4, max: 12, step: 0.1, quantity: 'diameter' }),
                    e(InputFieldWithUnits, { labelKey: 'spineLabel', valueMetric: spine, onChange: setSpine, min: 200, max: 1500, step: 25, quantity: null }),
