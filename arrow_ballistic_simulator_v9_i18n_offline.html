<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏹 Arrow Ballistic Simulator - Barebow/Stringwalking</title>
    <style>
        /* ========== STILI IDENTICI ALL'ORIGINALE (non modificati) ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; font-size: 14px; line-height: 1.5; }
        
        .theme-dark { background-color: #0f172a; color: #ffffff; }
        .theme-dark .panel { background-color: #1e293b; border-color: #334155; }
        .theme-dark .panel-header { background-color: #334155; color: #ffffff; }
        .theme-dark .panel-header:hover { background-color: #475569; }
        .theme-dark .input-field { background-color: #334155; border: 1px solid #475569; color: #ffffff; }
        .theme-dark .label { color: #94a3b8; }
        .theme-dark .table-header { background-color: #334155; }
        .theme-dark .table-row-even { background-color: rgba(51, 65, 85, 0.5); }
        .theme-dark .table-row-highlight { background-color: rgba(79, 70, 229, 0.3); }
        .theme-dark .table-text { color: #cbd5e1; }
        .theme-dark .table-text-bold { color: #ffffff; }
        .theme-dark .tabs-container { background-color: #1e293b; }
        .theme-dark .tab-btn { background-color: transparent; color: #ffffff; }
        .theme-dark .tab-btn:hover { background-color: #334155; }
        .theme-dark .tab-btn.active { background-color: #4f46e5; }
        .theme-dark .info-box { background-color: #334155; }
        
        .theme-light { background-color: #f3f4f6; color: #111827; }
        .theme-light .panel { background-color: #ffffff; border-color: #d1d5db; }
        .theme-light .panel-header { background-color: #e5e7eb; color: #111827; }
        .theme-light .panel-header:hover { background-color: #d1d5db; }
        .theme-light .input-field { background-color: #f9fafb; border: 2px solid #d1d5db; color: #111827; }
        .theme-light .input-field:focus { background-color: #ffffff; }
        .theme-light .label { color: #4b5563; }
        .theme-light .table-header { background-color: #f3f4f6; }
        .theme-light .table-row-even { background-color: #f9fafb; }
        .theme-light .table-row-highlight { background-color: #e0e7ff; }
        .theme-light .table-text { color: #374151; }
        .theme-light .table-text-bold { color: #111827; }
        .theme-light .tabs-container { background-color: #ffffff; border: 1px solid #d1d5db; }
        .theme-light .tab-btn { background-color: transparent; color: #111827; }
        .theme-light .tab-btn:hover { background-color: rgba(99, 102, 241, 0.1); }
        .theme-light .tab-btn.active { background-color: #4f46e5; color: white; }
        .theme-light .info-box { background-color: #f3f4f6; }
        
        .app-container { min-height: 100vh; padding: 8px; font-size: 14px; transition: background-color 0.3s, color 0.3s; }
        .header { text-align: center; margin-bottom: 16px; padding: 12px; background: linear-gradient(to right, #4f46e5, #7c3aed); border-radius: 12px; position: relative; }
        .header h1 { font-size: 1.25rem; font-weight: bold; color: white; }
        .header .subtitle { font-size: 0.75rem; color: #c7d2fe; }
        .header .credits { font-size: 0.75rem; color: #a5b4fc; margin-top: 4px; }
        .theme-toggle { position: absolute; top: 8px; right: 8px; padding: 8px; border-radius: 8px; background-color: rgba(255,255,255,0.2); border: none; cursor: pointer; font-size: 1rem; transition: background-color 0.2s; }
        .theme-toggle:hover { background-color: rgba(255,255,255,0.3); }
        .lang-unit-bar { position: absolute; top: 8px; left: 8px; display: flex; gap: 6px; align-items: center; }
        .lang-unit-bar button { padding: 6px 10px; border-radius: 8px; background-color: rgba(255,255,255,0.2); border: none; cursor: pointer; font-size: 0.9rem; transition: background-color 0.2s; color: white; font-weight: bold; }
        .lang-unit-bar button:hover { background-color: rgba(255,255,255,0.3); }
        .unit-toggle-bar { position: absolute; top: 8px; right: 70px; display: flex; gap: 4px; align-items: center; }
        .unit-toggle-bar button { padding: 6px 10px; border-radius: 8px; background-color: rgba(255,255,255,0.2); border: none; cursor: pointer; font-size: 0.9rem; transition: background-color 0.2s; color: white; font-weight: bold; }
        .unit-toggle-bar button:hover { background-color: rgba(255,255,255,0.3); }
        
        .main-layout { display: flex; flex-direction: column; gap: 12px; }
        @media (min-width: 1024px) { .main-layout { flex-direction: row; } }
        
        .params-grid { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; align-content: start; }
        @media (min-width: 1024px) { .params-grid { width: 420px; flex-shrink: 0; } }
        @media (max-width: 480px) { .params-grid { grid-template-columns: 1fr; gap: 6px; } }
        .col-span-2 { grid-column: span 2; }
        @media (max-width: 480px) { .col-span-2 { grid-column: span 1; } }
        .inner-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        
        .collapsible-panel { border-radius: 8px; overflow: hidden; }
        .panel-header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; text-align: left; font-weight: 600; font-size: 0.875rem; border: none; cursor: pointer; transition: background-color 0.2s; }
        .panel-header .arrow { color: #818cf8; }
        .panel-body { padding: 12px; border: 1px solid; border-top: none; border-radius: 0 0 8px 8px; }
        
        .form-group { margin-bottom: 8px; }
        .form-group label { display: block; font-size: 0.75rem; margin-bottom: 4px; }
        .input-field { width: 100%; padding: 4px 8px; font-size: 0.875rem; border-radius: 4px; outline: none; transition: border-color 0.2s, background-color 0.2s; }
        .input-field:focus { border-color: #6366f1; }
        .input-field:disabled { opacity: 0.5; }
        
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .checkbox-group input[type="checkbox"] { accent-color: #6366f1; }
        .checkbox-group span { font-size: 0.75rem; }
        .info-box { margin-top: 8px; padding: 8px; border-radius: 4px; font-size: 0.75rem; }
        .info-box .value { font-weight: bold; color: #22c55e; }
        .info-box .value-blue { font-weight: bold; color: #3b82f6; }
        
        .btn-simulate { width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; background: linear-gradient(to right, #22c55e, #059669); color: white; font-size: 1rem; transition: opacity 0.2s; }
        .btn-simulate:hover { opacity: 0.9; }
        .btn-simulate:disabled { background: #64748b; cursor: not-allowed; }
        
        .results-column { flex: 1; min-width: 0; }
        .metrics-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 12px; }
        @media (max-width: 768px) { .metrics-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 480px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; } }
        .metric-card { padding: 12px; border-radius: 8px; text-align: center; border: 1px solid; }
        .metric-card .title { font-size: 0.75rem; }
        .metric-card .value { font-size: 1.125rem; font-weight: bold; color: #6366f1; }
        
        .tabs-container { display: flex; gap: 4px; padding: 4px; border-radius: 8px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; border: none; cursor: pointer; transition: background-color 0.2s; }
        .tab-content { padding: 12px; border-radius: 12px; border: 1px solid; }
        .chart-container { height: 320px; position: relative; }
        
        .legend { display: flex; justify-content: flex-end; gap: 16px; margin-bottom: 8px; font-size: 0.7rem; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-dot { width: 12px; height: 3px; border-radius: 1px; }
        
        .target-legend { display: flex; justify-content: center; gap: 16px; margin-top: 8px; font-size: 0.75rem; }
        .target-legend .item { display: flex; align-items: center; gap: 4px; }
        .target-legend .dot { width: 12px; height: 12px; border-radius: 50%; }
        .target-legend .dot.orange { background-color: #f97316; }
        .target-legend .dot.green { background-color: #22c55e; }
        .target-legend .success { color: #22c55e; font-weight: bold; }
        
        .sight-section { display: flex; gap: 16px; }
        .sight-table-container { flex: 1; overflow-x: auto; }
        .sight-table { width: 100%; font-size: 0.75rem; border-collapse: collapse; }
        .sight-table th, .sight-table td { padding: 4px 8px; text-align: left; }
        .sight-table th { font-weight: 600; }
        .sight-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .sight-header h3 { font-weight: bold; color: #6366f1; }
        .btn-csv { padding: 4px 12px; background-color: #22c55e; color: white; border: none; border-radius: 4px; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
        .btn-csv:hover { background-color: #16a34a; }
        
        .sight-scale { width: 160px; flex-shrink: 0; }
        .sight-scale-inner { position: relative; height: 280px; margin: 16px auto; width: 100px; }
        .sight-bar { position: absolute; left: 50%; transform: translateX(-50%); width: 4px; height: 100%; border-radius: 2px; background: #64748b; }
        .sight-mark { position: absolute; left: 50%; transform: translateX(-50%); height: 2px; }
        .sight-mark-label { position: absolute; font-size: 0.65rem; white-space: nowrap; top: -5px; }
        .sight-mark-label.left { left: 28px; }
        .sight-mark-label.right { right: 28px; }
        .zero-line { position: absolute; left: 50%; transform: translateX(-50%); width: 40px; height: 2px; background-color: #ef4444; }
        .zero-label { position: absolute; left: 45px; top: -6px; font-size: 0.65rem; color: #ef4444; }
        .laser-dot { position: absolute; left: 50%; width: 10px; height: 10px; background-color: #22c55e; border-radius: 50%; margin-left: -5px; }
        .laser-label { position: absolute; left: 18px; top: -3px; font-size: 0.65rem; color: #22c55e; }
        
        .placeholder { height: 384px; display: flex; align-items: center; justify-content: center; border-radius: 12px; padding: 32px; border: 1px solid; }
        .placeholder-content { text-align: center; }
        .placeholder-icon { font-size: 4rem; margin-bottom: 16px; }
        .placeholder-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 8px; }
        
        .footer { text-align: center; margin-top: 16px; font-size: 0.75rem; }
        
        .modal-overlay { position: fixed; inset: 0; background-color: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
        .modal-content { max-width: 32rem; width: 100%; padding: 16px; border-radius: 12px; border: 1px solid; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .modal-header h3 { font-weight: bold; color: #6366f1; }
        .modal-close { font-size: 1.5rem; background: none; border: none; cursor: pointer; }
        .modal-close:hover { color: #ef4444; }
        .modal-textarea { width: 100%; height: 192px; padding: 8px; font-size: 0.75rem; font-family: monospace; border-radius: 4px; resize: none; }
        .modal-buttons { display: flex; gap: 8px; margin-top: 12px; }
        .modal-btn { flex: 1; padding: 8px; border-radius: 4px; font-weight: 600; font-size: 0.875rem; border: none; cursor: pointer; color: white; }
        .modal-btn.copy-btn { background-color: #4f46e5; }
        .modal-btn.download-btn { background-color: #22c55e; }
        .modal-btn.close-btn { background-color: #64748b; }
        .theme-light .modal-btn.close-btn { background-color: #d1d5db; color: #111827; }
    </style>

const I18nContext = createContext(null);

function useI18n() {
    return useContext(I18nContext);
}

// Conversioni metrico ↔ imperiale
const conversions = {
    mass_to_imperial: (g) => g * 15.4323584,
    mass_to_metric: (gr) => gr / 15.4323584,
    length_to_imperial: (m) => m * 39.3700787,
    length_to_metric: (in_) => in_ / 39.3700787,
    diameter_to_imperial: (mm) => mm * 0.0393700787,
    diameter_to_metric: (in_) => in_ / 0.0393700787,
    speed_to_imperial: (mps) => mps * 3.2808399,
    speed_to_metric: (fts) => fts / 3.2808399,
    energy_to_imperial: (j) => j * 0.737562149,
    energy_to_metric: (ftlbf) => ftlbf / 0.737562149,
    temp_to_imperial: (c) => c * 9/5 + 32,
    temp_to_metric: (f) => (f - 32) * 5/9,
    pressure_to_imperial: (hpa) => hpa * 0.029529987,
    pressure_to_metric: (inhg) => inhg / 0.029529987,
    altitude_to_imperial: (m) => m * 3.2808399,
    altitude_to_metric: (ft) => ft / 3.2808399,
    distance_to_imperial: (m) => m * 1.09361,
    distance_to_metric: (yd) => yd / 1.09361,
    drop_to_imperial: (cm) => cm * 0.393700787,
    drop_to_metric: (inch) => inch / 0.393700787,
    balance_to_imperial: (m) => m * 39.3700787,
    balance_to_metric: (in_) => in_ / 39.3700787,
};

function I18nProvider({ children }) {
    const [language, setLanguage] = useState('it');
    const [unitSystem, setUnitSystem] = useState('metric');

    const t = useCallback((key, ...args) => {
        let str = translations[language][key] || key;
        if (typeof str === 'function') return str(...args);
        return str;
    }, [language]);

    const convertFromMetric = useCallback((value, quantity) => {
        if (unitSystem === 'metric') return value;
        if (!quantity) return value;
        const conv = conversions[`${quantity}_to_imperial`];
        return conv ? conv(value) : value;
    }, [unitSystem]);

    const convertToMetric = useCallback((value, quantity) => {
        if (unitSystem === 'metric') return value;
        if (!quantity) return value;
        const conv = conversions[`${quantity}_to_metric`];
        return conv ? conv(value) : value;
    }, [unitSystem]);

    const value = { language, setLanguage, unitSystem, setUnitSystem, t, convertFromMetric, convertToMetric };
    return e(I18nContext.Provider, { value }, children);
}

// =============================================================================
// FUNZIONI FISICHE (IDENTICHE ALL'ORIGINALE, RESTANO IN METRICO)
// =============================================================================
function calculateAirDensity(tempC, pressureHpa, humidityPct) {
    const tempK = tempC + 273.15;
    const pSat = 610.78 * Math.exp(17.2694 * tempC / (tempC + 238.3));
    const pVapor = (humidityPct / 100.0) * pSat / 100.0;
    const pDry = pressureHpa - pVapor;
    return (pDry * 100) / (PHYSICAL_CONSTANTS.R_SPECIFIC_AIR * tempK) + (pVapor * 100) / (461.5 * tempK);
}
function reynoldsNumber(v, diameterMm, params) {
    let correctedTemp = params.airTemperature;
    let correctedPressure = params.airPressure;
    if (params.altitude && params.altitude > 0) {
        correctedPressure = params.airPressure * Math.pow(1 - 0.0065 * params.altitude / 288.15, 5.255);
        correctedTemp = params.airTemperature - 0.0065 * params.altitude;
    }
    const rho = calculateAirDensity(correctedTemp, correctedPressure, params.humidity);
    const mu = PHYSICAL_CONSTANTS.AIR_VISCOSITY * (correctedTemp + 273.15) / 291.15;
    return (rho * v * (diameterMm / 1000.0)) / mu;
}
function calculateFOC(length, balancePoint) {
    const centroGeometrico = length / 2;
    return ((balancePoint - centroGeometrico) / length) * 100;
}
function calculateSpineStabilityFactor(spine, arrowLength, params) {
    const drawWeightLb = params.drawForce || 40;
    const arrowLengthInches = arrowLength * 39.37;
    const pointWeight = params.tipWeight || 100;
    const lengthFactor = 1 + (arrowLengthInches - 28) * 0.035;
    const pointFactor = 1 + (pointWeight - 100) * 0.002;
    const idealSpine = (26000 / drawWeightLb) * lengthFactor * pointFactor;
    const spineRatio = spine / idealSpine;
    let oscillationAmplitude = 0;
    if (spineRatio > 1.10) {
        const excess = spineRatio - 1.10;
        oscillationAmplitude = excess * 80;
    } else if (spineRatio < 0.90) {
        const deficit = 0.90 - spineRatio;
        oscillationAmplitude = deficit * 100;
    } else if (spineRatio > 1.0) {
        oscillationAmplitude = (spineRatio - 1.0) * 30;
    } else {
        oscillationAmplitude = (1.0 - spineRatio) * 40;
    }

// Campo dedicato per l'offset di incocco: sempre in mm, con pulsanti +/-

function NockingOffsetField({ value, onChange }) {
    const { t } = useI18n();
    // value è in mm (es. 5 = 5mm sopra la perpendicolare)
    const step = 1; // mm
    const min = -10;
    const max = 20;
    const [display, setDisplay] = useState(String(value));
    useEffect(() => { setDisplay(String(value)); }, [value]);
    const commit = (v) => {
        let n = parseFloat(v);
        if (isNaN(n)) { setDisplay(String(value)); return; }
        n = Math.max(min, Math.min(max, Math.round(n)));
        onChange(n);
        setDisplay(String(n));
    };
    return e('div', { className: 'form-group' },
        e('label', { className: 'label' }, `${t('nockingOffsetLabel')} (mm)`),
        e('div', { style: { display: 'flex', alignItems: 'center', gap: '4px' } },
            e('button', {
                onClick: () => { const nv = Math.max(min, value - step); onChange(nv); setDisplay(String(nv)); },
                style: { padding: '2px 8px', borderRadius: '4px', border: '1px solid #475569', background: '#334155', color: '#fff', cursor: 'pointer', fontSize: '1rem', lineHeight: '1.4', flexShrink: 0 }
            }, '−'),
            e('input', {
                type: 'text', inputMode: 'decimal',
                value: display,
                onChange: ev => setDisplay(ev.target.value),

                className: 'input-field',
                style: { textAlign: 'center', flex: 1 }

            e('button', {
                onClick: () => { const nv = Math.min(max, value + step); onChange(nv); setDisplay(String(nv)); },
                style: { padding: '2px 8px', borderRadius: '4px', border: '1px solid #475569', background: '#334155', color: '#fff', cursor: 'pointer', fontSize: '1rem', lineHeight: '1.4', flexShrink: 0 }
            }, '+')

}

function InputFieldWithUnits({ labelKey, valueMetric, onChange, min, max, step, disabled, quantity }) {
    const { t, unitSystem, convertFromMetric, convertToMetric } = useI18n();
    const [draft, setDraft] = useState(() => convertFromMetric(valueMetric, quantity).toFixed(2));
    const inputRef = React.useRef(null);
    const committedMetricRef = React.useRef(valueMetric);
    useEffect(() => {
        if (inputRef.current && inputRef.current === document.activeElement) return;
        committedMetricRef.current = valueMetric;
        setDraft(convertFromMetric(valueMetric, quantity).toFixed(2));
    }, [valueMetric, unitSystem, quantity]);
    const handleChange = (ev) => { setDraft(ev.target.value); };
    const commit = (raw) => {
        const trimmed = (raw || '').trim();
        if (trimmed === '' || trimmed === '-' || trimmed === '.' || trimmed === '-.') {
            setDraft(convertFromMetric(committedMetricRef.current, quantity).toFixed(2));
            return;
        }
        const num = parseFloat(trimmed);
        if (isNaN(num)) { setDraft(convertFromMetric(committedMetricRef.current, quantity).toFixed(2)); return; }
        let metricVal = convertToMetric(num, quantity);
        if (!isNaN(min) && metricVal < min) metricVal = min;
        if (!isNaN(max) && metricVal > max) metricVal = max;
        committedMetricRef.current = metricVal;
        setDraft(convertFromMetric(metricVal, quantity).toFixed(2));
        if (metricVal !== valueMetric) onChange(metricVal);
    };
    const handleBlur = (ev) => commit(ev.target.value);
    const handleKeyDown = (ev) => { if (ev.key === 'Enter') { commit(ev.target.value); ev.target.blur(); } };
    let unitLabel = '';
    if (quantity === 'mass') unitLabel = unitSystem === 'metric' ? t('unit_mass_metric') : t('unit_mass_imperial');
    else if (quantity === 'length') unitLabel = unitSystem === 'metric' ? t('unit_length_metric') : t('unit_length_imperial');
    else if (quantity === 'diameter') unitLabel = unitSystem === 'metric' ? t('unit_diameter_metric') : t('unit_diameter_imperial');
    else if (quantity === 'drawForce') unitLabel = t('unit_drawForce');
    else if (quantity === 'speed') unitLabel = unitSystem === 'metric' ? t('unit_speed_metric') : t('unit_speed_imperial');
    else if (quantity === 'energy') unitLabel = unitSystem === 'metric' ? t('unit_energy_metric') : t('unit_energy_imperial');
    else if (quantity === 'temperature') unitLabel = unitSystem === 'metric' ? t('unit_temp_metric') : t('unit_temp_imperial');
    else if (quantity === 'pressure') unitLabel = unitSystem === 'metric' ? t('unit_pressure_metric') : t('unit_pressure_imperial');
    else if (quantity === 'altitude') unitLabel = unitSystem === 'metric' ? t('unit_altitude_metric') : t('unit_altitude_imperial');
    else if (quantity === 'distance') unitLabel = unitSystem === 'metric' ? t('unit_distance_metric') : t('unit_distance_imperial');
    else if (quantity === 'balance') unitLabel = unitSystem === 'metric' ? t('unit_balance_metric') : t('unit_balance_imperial');
    else unitLabel = '';
    return e('div', { className: 'form-group' },
        e('label', { className: 'label' }, `${t(labelKey)}${unitLabel ? ` (${unitLabel})` : ''}`),
        e('input', {
            ref: inputRef,
            type: 'text',
            inputMode: 'decimal',
            value: draft,
            onChange: handleChange,
            onBlur: handleBlur,
            onKeyDown: handleKeyDown,
            disabled,
            className: 'input-field',
            style: { textAlign: 'right' }
        })
    );
}

            e('div', { style: { fontWeight: 'bold', marginBottom: '4px', color: darkMode ? '#818cf8' : '#4f46e5' } }, `${xLabelText.split(' ')[0]}: ${Math.round(tooltip.data[xKey] * 100) / 100}`),
            ...yKeys.map((yKey, idx) => {

                    e('span', { style: { color: darkMode ? '#cbd5e1' : '#374151' } }, `${labels[yKey]}: `),
                    e('span', { style: { fontWeight: 'bold', color: colors[idx] } }, Math.round(val * 100) / 100)
                );
            })
        )
    );
}

function SightScaleViz({ sightMarks, eyeToNock, nockToRiser, darkMode }) {
    const { t, unitSystem, convertFromMetric } = useI18n();
    if (!sightMarks || !sightMarks.length) return null;
    let projections = sightMarks.map(m => m.projectionCm);
    if (unitSystem === 'imperial') {
        projections = projections.map(cm => conversions.drop_to_imperial(cm));
    }
    const minP = Math.min(...projections, 0);
    const maxP = Math.max(...projections, 0);
    const padding = 3;
    const rangeMin = minP - padding;
    const rangeMax = maxP + padding;
    const range = rangeMax - rangeMin || 1;
    const toPercent = val => ((val - rangeMin) / range) * 100;
    const laserDist = 30;
    const laserProjM = laserDist * eyeToNock / (nockToRiser + laserDist);
    let laserProjCm = laserProjM * 100;
    if (unitSystem === 'imperial') laserProjCm = conversions.drop_to_imperial(laserProjCm);
    return e('div', { className: 'sight-scale' },
        e('div', { className: 'sight-scale-inner' },
            e('div', { className: 'sight-bar' }),
            e('div', { className: 'zero-line', style: { bottom: toPercent(0) + '%' } }, e('span', { className: 'zero-label' }, '0 cm')),
            sightMarks.map((m, i) => {
                let proj = m.projectionCm;
                if (unitSystem === 'imperial') proj = conversions.drop_to_imperial(proj);
                const dist = unitSystem === 'metric' ? m.distance : conversions.distance_to_imperial(m.distance);
                return e('div', { key: m.distance, className: 'sight-mark', style: { bottom: toPercent(proj) + '%', width: 20, backgroundColor: `hsl(${200 + i * 15}, 70%, ${darkMode ? 55 : 45}%)` } },
                    e('span', { className: 'sight-mark-label ' + (i % 2 === 0 ? 'left' : 'right'), style: { color: darkMode ? '#cbd5e1' : '#374151' } }, Math.round(dist) + (unitSystem === 'metric' ? 'm' : 'yd'))
                );
            }),
            e('div', { className: 'laser-dot', style: { bottom: toPercent(laserProjCm) + '%' } },
                e('span', { className: 'laser-label' }, `Laser ${unitSystem === 'metric' ? '30m' : '33yd'}`)
            )
        )
    );
}

    }, [mass, drawForce, drawLength, braceHeight, efficiency, useMeasuredV0, v0Measured, airTemperature, airPressure, humidity, altitude]);
    const calculatedFOC = useMemo(() => calculateFOC(length, balancePoint), [length, balancePoint]);

    const imperialChartData = useMemo(() => {
        if (!results?.chartData) return null;

            x: conversions.distance_to_imperial(d.x),

    const imperialDropData = useMemo(() => {

    const runSimulation = useCallback(() => {
        setIsSimulating(true);
        setTimeout(() => {
            try {
                const baseParams = {

                    drawForce, drawLength, braceHeight, efficiency, bowType, 
                    launchHeightNeutral, targetDistance, targetHeight, 
                    useMeasuredV0, v0: v0Measured, windSpeed, airTemperature, 
                    airPressure, humidity, altitude, eyeToNock, nockToRiser, nockingOffset,
                    anchorLength, pelvisHeight
                };
                const nockingOffsetM = nockingOffset / 1000;
                const restToCockDistance = length * 0.9;
                const nockingAngleOffset = Math.atan2(nockingOffsetM, restToCockDistance) * 180 / Math.PI;
                let finalLaunchHeight = launchHeightNeutral;
                let effectiveLaunchAngle;
                if (usePosturalCorrection) {
                    let currentHeight = launchHeightNeutral;
                    for (let iter = 0; iter < 8; iter++) {

                    const vx = trajectory.Vx[i], vy = trajectory.Vy[i];

                }

        doc.setTextColor(0,0,0);

        // ── Righelli di riferimento 5 cm – per verificare che la stampa sia al 100% ──

        doc.line(leftRulerX, zeroYpos, leftRulerX, zeroYpos - rulerLength);
        for (let i = 0; i <= 5; i++) {
            const tickY = zeroYpos - i * MM_PER_CM;
            const tw = i % 5 === 0 ? 3 : 2;
            doc.line(leftRulerX - tw, tickY, leftRulerX + tw, tickY);
            doc.text(String(i), leftRulerX - 5, tickY + 1, { align: 'right' });
        }
        doc.text('cm', leftRulerX - 5, zeroYpos - rulerLength - 4, { align: 'right' });

        // Righello ORIZZONTALE a destra: 5 cm verso destra dallo zero-mirino
        const rightRulerStartX = scaleX + 25;
        doc.line(rightRulerStartX, zeroYpos, rightRulerStartX + rulerLength, zeroYpos);
        for (let i = 0; i <= 5; i++) {
            const tickX = rightRulerStartX + i * MM_PER_CM;
            const th = i % 5 === 0 ? 3 : 2;
            doc.line(tickX, zeroYpos - th, tickX, zeroYpos + th);
            doc.text(String(i), tickX, zeroYpos + 6, { align: 'center' });
        }
        doc.text('cm', rightRulerStartX + rulerLength + 4, zeroYpos + 1);

        // Nota di scala
        doc.setFontSize(7); doc.setTextColor(100,100,100);
        doc.text('Scala 1:1 - Stampare al 100% / Print at 100%', pageWidth / 2, scaleTop + scaleHeight + 18, { align: 'center' });
        doc.setTextColor(0,0,0);

        doc.save(`sight_scale_${targetDistance}${unitSystem === 'metric' ? 'm' : 'yd'}.pdf`);
