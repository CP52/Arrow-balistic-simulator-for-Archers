# Netlify configuration for Arrow Ballistic Simulator
# Drop this folder on netlify.com/drop or connect the GitHub repo

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    # Allow CDN scripts (React, jsPDF)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; connect-src 'none'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"
